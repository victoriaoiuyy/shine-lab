<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Контакти | Бутик "Shine"</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Зв'яжіться з нами</h1>
        <nav>
            <a href="index.html">Головна</a> 
            <a href="catalog.html">Каталог ароматів</a> 
            <a href="contact.html">Контакти</a>
        </nav>
    </header>

    <main class="contact-layout">
        <section class="form-section">
            <h2>Запис на дегустацію ароматів</h2>
            <form action="#" method="POST">
                <label for="userEmail">Ваш Email:</label>
                <input type="email" id="userEmail" name="userEmail" required placeholder="example@mail.com">

                <label for="userTel">Номер телефону:</label>
                <input type="tel" id="userTel" name="userTel" required pattern="[0-9]{10}" placeholder="0991234567" title="Введіть 10 цифр (наприклад: 0991234567)">

                <label for="socialUrl">Посилання на ваш Instagram (необов'язково):</label>
                <input type="url" id="socialUrl" name="socialUrl" placeholder="https://instagram.com/...">

                <label for="visitDate">Оберіть дату та час візиту:</label>
                <input type="datetime-local" id="visitDate" name="visitDate" required>

                <input type="submit" value="Відправити заявку" class="submit-btn">
            </form>
        </section>

        <aside>
            <h3>Наша адреса</h3>
            <p>м. Харків<br>вул. Сумська, 14</p>
            <p><strong>Графік роботи:</strong><br>Пн-Сб, 10:00 - 19:00</p>
        </aside>
    </main>

    <footer>
        <p>&copy; 2026 Бутик "Shine".</p>
    </footer>
</body>
</html>
